name: Collect Articles

on:
  schedule:
    # 07:00 JST = 22:00 UTC（SPEC §8.1）
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      backfill_days:
        description: '初回バックフィル用: 取得対象を直近 N 日に絞る (0=制限なし)'
        required: false
        default: '0'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: batch/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: batch

      - name: Run collect
        run: npm run collect
        working-directory: batch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
          LLM_PROVIDER: gemini
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '0' }}

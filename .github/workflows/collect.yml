name: Collect Articles

on:
  schedule:
    # 05:00 JST = 20:00 UTC（SPEC §8.1）
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      backfill_days:
        description: 'バックフィル日数（デフォルト1=当日分のみ、0=制限なし・初回専用）'
        required: false
        default: '1'

jobs:
  collect:
    runs-on: ubuntu-latest
    # 新規最大約260件を4秒間隔（15 RPM枠）で逐次 enrich すると下限17分＋Gemini
    # の実レイテンシで30分に拮抗し、混雑日にタイムアウトで落ちるため45分に引き上げ。
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: batch/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: batch

      - name: Run collect
        run: npm run collect
        working-directory: batch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
          LLM_PROVIDER: gemini
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '1' }}

      - name: Run summarize
        # summarize.ts 自体は内部で fail-soft しているが、念のため未知の例外で
        # ワークフロー全体を落とさないよう continue-on-error にしておく（フェーズ E）。
        run: npm run summarize
        working-directory: batch
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run notify
        # notify.ts 自体は内部で fail-soft しているが、summarize と同じ流儀で
        # 未知の例外に備えて continue-on-error にしておく（フェーズ F）。
        run: npm run notify
        working-directory: batch
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
